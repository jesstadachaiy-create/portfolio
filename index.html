<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(46, 125, 50, 0.2);
            border-top: 8px solid #66bb6a;
            text-align: center;
            position: relative;
        }

        .leaf {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            color: #2e7d32;
            font-size: 24px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .info {
            background: #f1f8e9;
            border-left: 5px solid #81c784;
            border-radius: 8px;
            padding: 15px 20px;
            margin: 15px 0;
            text-align: left;
        }

        .info p {
            color: #33691e;
            font-size: 16px;
            margin: 0;
        }

        .info span {
            font-weight: bold;
            color: #1b5e20;
        }

        .footer-line {
            margin-top: 25px;
            color: #7cb342;
            font-size: 14px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="leaf">🌿</div>
        <h1>ยินดีต้อนรับเข้าสู่เว็บไซต์ของเจษฎา</h1>

        <div class="info">
            <p><span>ชื่อ-นามสกุล :</span> เจษฎา ไชยยา</p>
        </div>

        <div class="info">
            <p><span>ตำแหน่ง :</span> นักศึกษาสาขาเทคโนโลยีสารสนเทศ</p>
        </div>

        <div class="footer-line">🍃 เติบโตทุกวันด้วยความรู้และประสบการณ์ 🍃</div>
    </div>
</body>
</html>
